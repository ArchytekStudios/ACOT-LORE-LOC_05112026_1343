acot_startup_origins.2101.name: "Alone in the Dark"
acot_startup_origins.2101.desc: "This is a dark day for us all. We have been defeated...utterly. Our civilization is in ruins. Our beloved homeworld tarnished beyond recognition. Our people...defiled.\n\nBut we managed to survive still. We must recover from this crisis, so that we may avenge the fallen. The capital city may have been destroyed, but the bastion, a prototype to a next-generation fortress survived despite the damaged. With it, we'll rebuild our lost society."
acot_startup_origins.2101.a: "[Root.GetName] will rise again!"

###########################################

acot_startup.9999.name: "Warning From Beyond"
acot_startup.9999.desc: "Hello again, people. Panada here. Sorry to inform you but the game is outdated.\n\nYes, indeed. After months ACOT is finally getting that update. So now is the correct time for you to start a new game. That, or unsubscribe from ACOT due to some changes in the next update."
acot_startup.9999.a: "Who are you again?"
acot_startup.9999.a.response: "Seriously? Do I have to introduce myself every time there's a major ACOT update? I am the creator of this mod, bruh. Trust me, I am an expert at identifying a Panada. This event will play every time there's a big major update that'd break existing save. And you're now having one.\n\nNow, in the past I tried to be more a god-like entity but it was annoying to write dialogues around it, so this time I will just be a typical lazy furball."
acot_startup.9999.b: "Why did you take forever to update this time?"
acot_startup.9999.b.response: "You see? This and that happened and stuffs and you know. Stop asking questions! Just consume update and gets excited for the next update! Do you guys not have phones?\n\nBut it's mostly because, as usual, PDX decides to drop big chungus update while I am also working on the update, and the galaxy-brain players also decided to only start reporting bugs a month after I had all the time to fix the bugs before committing to a next major update.\n\nYes, indeed. This is clearly, without a doubt, not my fault! All of you owe me some reinforced hard-light bamboos equipped with targeting sensors."
acot_startup.9999.c: "Why should we unsubscribe? What changed?"
acot_startup.9999.c.response: "As you can likely tell, based on the image that is used on this very image. ACOT will start to use a more consistent AI-assisted/generated images for some assets like event pictures, tech icons or some other similar assets. Most of which are reintepetration of existing kit-bashed icons so that they fit more with what I really have in mind for how things should look.\n\nTechnically, ACOT has been doing a bit of that for awhile now, but it was mostly basic and only applied to army icons and occasionally component icons. But they were not the best, since its mostly generic stuffs and with wrong art styles. The new techniques are way more consistent and more in-line with Stellaris aliens and styles etc. etc. If you're interested in how the processes are actually done (Because I didn't really just ask the AI to make an image and it gets done. it is actually quite bad at the job tbh), you can check more about it on Discord.\n\nBut I am aware not everyone's vibing with this kind of stuffs. So if you do not wish to support a lazy furball who has succumbed to AI slop, you know what do, Private Snowball."
acot_startup.9999.d: "What actually gets updated this time?"
acot_startup.9999.d.response: "A lot of stuffs, actually. Here's some basic list.\n\n- Alpha Tech Acquisition Reworks\n- Fractured/Enigmatic/Void Sphere Reworks\n- Phanon Excalation Changes and Updated Assets.\n- ACOT zones for standard planets\n- Final Spook Origin expansion\n- Other stuffs I kinda forgot.\n\nSerious, go check the patch notes (when it's up). Also get me more bamboos."
acot_startup.9999.e: "Very well. End this game then."
acot_startup.9999.e.tooltip: "You just win the game, the end."
acot_startup.9999.e.response: "Good, very good. Here's your victory. Now turn off the game right now."
acot_startup.9999.f: "Let me screw around with this broken save a bit more."
acot_startup.9999.f.tooltip: "Not responsible for any broken bugs from playing on outdated game!"
acot_startup.9999.f.response: "Sure. Wait, did you just eat my bamboos? COME BACK HE...\n\n<Communication Terminated>"
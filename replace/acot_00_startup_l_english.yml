acot_startup_origins.101.name: "Tier 1 Start Setup: Expansion"
acot_startup_origins.101.desc: "Let's review our history. How far have we expanded leading up to the present day?"
acot_startup_origins.101.a: "We have not expanded at all."
acot_startup_origins.101.a.tooltip: "No additional system expansions."
acot_startup_origins.101.b: "Only slightly."
acot_startup_origins.101.b.tooltip: "Acquires every neighbouring system to the Capital."
acot_startup_origins.101.c: "Quite a bit."
acot_startup_origins.101.c.tooltip: "Acquires every neighbouring system and its neighbours, starting from the Capital System."

acot_startup_origins.102.name: "Tier 1 Start Setup: Colonization"
acot_startup_origins.102.desc: "How's our colonization plan coming along?"
acot_startup_origins.102.a: "We did not colonize any planets."
acot_startup_origins.102.a.tooltip: "No other planets will be colonized."
acot_startup_origins.102.b: "Only a few"
acot_startup_origins.102.b.tooltip: "Up to two colonizable with at least 50% habitability will be colonized."
acot_startup_origins.102.c: "We colonized every planets we could along the way."
acot_startup_origins.102.c.tooltip: "All colonizable planets with at least 50% habitability will be colonized."

acot_startup_origins.103.name: "Tier 1 Start Setup: Leadership"
acot_startup_origins.103.desc: "How's our leader management?"
acot_startup_origins.103.a: "We did not train any leaders"
acot_startup_origins.103.a.tooltip: "No changes to existing leaders."

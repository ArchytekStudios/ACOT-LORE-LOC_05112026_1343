pc_acot_void_hole_desc: "Whatever this is, what ungodly horror we made with our power is beyond any doubt bone chilling. Fallen Empires look away in fear, plebs wet themselves at the sight of this once beautiful thing turned into this monsterous sight. For what we have created is truly some terrible. terrible shit."

pc_dark_fractured: "Fractured World"
pc_dark_fractured_adj: "Fractured World"
pc_dark_fractured_desc: "Fractured Worlds are covered by violent storms and filled with many dark anomalies. Though there are spots that are now habitable, the planet remains a desolate land, barely capable of supporting any life."
 

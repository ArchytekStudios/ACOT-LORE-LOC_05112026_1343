tech_acot_fractured_trapper: "Enigmatic Spires"
tech_acot_fractured_trapper_desc: "Although Dark Energies and Dark Matters surround the fractured worlds in abundance, most are too unstable and dispersed to be harvested. Designs for Enigmatic Spires are being drawn to trap and convert these unnaturally-born phenomenon into limitless supplies."

